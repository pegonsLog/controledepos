<div class="dashboard-wrapper animate-fade-in">
  <div class="dashboard-header">
    <div class="header-top">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
      </svg>
      <div class="header-text">
        <h1>Dashboard de POs</h1>
        <p>POs realizados por funcionário responsável</p>
      </div>
    </div>

    <div class="header-controls" [formGroup]="range">
      <mat-form-field appearance="outline">
        <mat-label>Data início</mat-label>
        <input matInput [matDatepicker]="pickerStart" formControlName="start"
               placeholder="DD/MM/AAAA" (dateChange)="onStartDateChange()" />
        <mat-datepicker-toggle matSuffix [for]="pickerStart"></mat-datepicker-toggle>
        <mat-datepicker #pickerStart></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Data fim</mat-label>
        <input matInput [matDatepicker]="pickerEnd" formControlName="end"
               placeholder="DD/MM/AAAA" (dateChange)="onEndDateChange()" />
        <mat-datepicker-toggle matSuffix [for]="pickerEnd"></mat-datepicker-toggle>
        <mat-datepicker #pickerEnd></mat-datepicker>
      </mat-form-field>

      <button class="btn-back" [routerLink]="['/menu']">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
        </svg>
        Voltar ao Menu
      </button>
    </div>
  </div>

  <!-- Loading state -->
  <div class="loading-state" *ngIf="loading">
    <div class="loading-spinner"></div>
    <p>Carregando dados...</p>
  </div>

  <!-- Chart barras -->
  <div class="chart-card chart-card--bar" *ngIf="!loading">
    <div class="chart-header">
      <svg class="chart-icon icon-bar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
      </svg>
      <div class="chart-title">
        <h3>Ranking de POs por Funcionário</h3>
        <span class="periodo-label" *ngIf="periodoLabel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
          </svg>
          {{ periodoLabel }}
        </span>
      </div>
      <div class="total-badge">
        <span class="total-label">Total</span>
        <span class="total-value">{{ total }}</span>
      </div>
    </div>

    <div class="chart-content" *ngIf="barData.length > 0; else emptyStateBar">
      <ngx-charts-bar-horizontal
        [view]="barView"
        [scheme]="colorScheme"
        [results]="barData"
        [gradient]="gradient"
        [xAxis]="true"
        [yAxis]="true"
        [showXAxisLabel]="true"
        [showYAxisLabel]="false"
        [xAxisLabel]="'Quantidade de POs'"
        [showDataLabel]="true"
        [trimXAxisTicks]="false"
        [trimYAxisTicks]="false"
        [xAxisTickFormatting]="xAxisFormat"
        (select)="onSelect($event)">
      </ngx-charts-bar-horizontal>
    </div>

    <ng-template #emptyStateBar>
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
        </svg>
        <p>Nenhum dado encontrado para o período selecionado.</p>
      </div>
    </ng-template>
  </div>
</div>
